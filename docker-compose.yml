services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: telascore_db
      MYSQL_ROOT_PASSWORD: telascore
      MYSQL_USER: telascore
      MYSQL_PASSWORD: telascore
    ports:
      - "3307:3306"
    volumes:
      - telascore_mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-utelascore", "-ptelascore"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./TelaScore
      dockerfile: apresentacao-backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://db:3306/telascore_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: telascore
      DB_PASSWORD: telascore
      TELASCORE_TOKEN_SECRET: troque-este-segredo-em-producao
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./TelaScore/apresentacao-frontend/telascore-frontend
      args:
        REACT_APP_API_URL: ""
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  telascore_mysql:
