services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-telascore_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-telascore-root}
      MYSQL_USER: ${MYSQL_USER:-telascore}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-defina-uma-senha}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - telascore_mysql_fresh:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./TelaScore
      dockerfile: apresentacao-backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-telascore_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: ${MYSQL_USER:-telascore}
      DB_PASSWORD: ${MYSQL_PASSWORD:-defina-uma-senha}
      TELASCORE_TOKEN_SECRET: ${TELASCORE_TOKEN_SECRET:-telascore-token-local}
      TELASCORE_UPLOAD_DIR: /app/uploads/avatars
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_CATALOG_PAGES: ${TMDB_CATALOG_PAGES:-20}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - telascore_uploads:/app/uploads

  frontend:
    build:
      context: ./TelaScore/apresentacao-frontend/telascore-frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
        REACT_APP_TMDB_API_KEY: ${TMDB_API_KEY:-}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  telascore_mysql_fresh:
  telascore_uploads:
